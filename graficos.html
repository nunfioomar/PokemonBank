<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráficos - Pokémon Bank</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <nav class="navbar navbar-dark poke-bg mb-4">
        <span class="navbar-brand mb-0 h1">Análisis Gráfico</span>
        <a href="acciones.html" class="btn btn-light btn-sm font-weight-bold">Volver al Menú</a>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h4 class="text-center mb-4">Transacciones por Tipo</h4>
                    <canvas id="transaccionesChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('transaccionesChart').getContext('2d');
        const transaccionesChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Depósitos', 'Retiros', 'Pago de Servicios'],
                datasets: [{
                    label: 'Cantidad de Transacciones',
                    data: [5, 3, 2], // Datos ficticios
                    backgroundColor: [
                        '#28a745', // Verde
                        '#ffc107', // Amarillo
                        '#17a2b8'  // Azul claro
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true
            }
        });
    </script>
</body>
</html>
